name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2112
          script: |
            # Load environment variables and NVM
            export NVM_DIR="$HOME/.nvm"
            [ -s "$NVM_DIR/nvm.sh" ] && \. "$NVM_DIR/nvm.sh"
            export PATH=$PATH:/usr/local/bin:/usr/bin
            
            # Navigate to the project directory
            cd /var/www/autoniq-dental
            
            # Pull latest code from main
            git pull origin main
            
            # Install backend and frontend dependencies
            npm install
            
            # Build the Vite frontend
            npm run build
            
            # Restart the Node server via PM2
            # (Assumes the PM2 process is named 'autoniq-dashboard')
            pm2 restart autoniq-dashboard || pm2 start server.js --name "autoniq-dashboard"
