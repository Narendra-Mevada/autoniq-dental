name: Deploy to VPS

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Deploy to VPS
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 2112
          script: |
            export PATH=$PATH:/home/ubuntu/.local/bin:/home/ubuntu/.hermes/node/bin

            node -v
            npm -v
            pm2 -v

            rm -rf /var/www/autoniq-dental

            git clone https://github.com/Narendra-Mevada/autoniq-dental.git /var/www/autoniq-dental

            cd /var/www/autoniq-dental

            cat > .env << EOF
            DATABASE_URL=${{ secrets.DATABASE_URL }}
            N8N_API_KEY=${{ secrets.N8N_API_KEY }}
            PORT=${{ secrets.PORT }}
            EOF

            npm install
            npm run build

            pm2 restart autoniq-dashboard --update-env || pm2 start server.js --name autoniq-dashboard

            pm2 save
